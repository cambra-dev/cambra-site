# Netlify Forms requires "Form detection" to be enabled in the Netlify dashboard:
#   Site settings → Forms → Form detection → Enable form detection
# Without this, form submissions will 404 regardless of data-netlify attributes
# in the HTML. The setting is NOT enabled by default.

[build]
  command = "npm run build"
  publish = "dist"

[[headers]]
  for = "/_astro/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
